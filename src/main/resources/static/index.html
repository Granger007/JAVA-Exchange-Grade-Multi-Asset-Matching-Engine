<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Simulation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(16, 22, 35, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --buy-color: #10b981;
            --sell-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            overflow: hidden;
            min-height: 0;
        }

        .panel h2 {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
            flex-shrink: 0;
        }

        /* Agents Panel & Metrics */
        .agents-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
        }

        .agent-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .agent-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .agent-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }

        .metric span.val {
            font-family: 'Roboto Mono', monospace;
            color: white;
            font-weight: 600;
        }

        .metric span.val.positive { color: var(--buy-color); }
        .metric span.val.negative { color: var(--sell-color); }

        .pulse-dot {
            width: 8px; height: 8px;
            background-color: var(--buy-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--buy-color);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; box-shadow: 0 0 12px var(--buy-color); }
        }

        /* Center Content */
        .center-col {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 1.5rem;
            grid-column: 2;
            min-height: 0;
        }

        .chart-container {
            position: relative;
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        /* Order Book */
        .orderbook-panel {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            flex: 1;
            min-height: 0;
        }

        .book-half { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .book-header {
            display: flex; justify-content: space-between;
            color: var(--text-muted); padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .book-row {
            display: flex; justify-content: space-between;
            padding: 0.2rem 0; cursor: default; flex-shrink: 0;
        }
        .book-row:hover { background: rgba(255,255,255,0.02); }

        .price-buy { color: var(--buy-color); font-weight: 600; }
        .price-sell { color: var(--sell-color); font-weight: 600; }

        /* Right Column */
        .right-col {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 1.5rem;
            grid-column: 3;
            min-height: 0;
        }

        .feed-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
        }

        .feed-table th {
            text-align: left; padding: 0.5rem;
            color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .feed-table td {
            text-align: left; padding: 0.4rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            white-space: nowrap;
        }

        .log-stream {
            display: flex; flex-direction: column-reverse;
            gap: 0.5rem; overflow-y: auto; flex: 1;
            font-family: 'Roboto Mono', monospace; font-size: 0.75rem;
            color: var(--text-muted); padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <header>
        <h1>Aurora <span>Simulation Dashboard</span></h1>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="restart-btn" style="background: var(--sell-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-family: inherit; font-weight: 600; cursor: pointer; transition: opacity 0.2s;">
                Restart Simulation
            </button>
            <span style="color: var(--text-muted);">Active Target:</span>
            <select id="symbol-select" style="background: var(--panel-bg); color: white; border: 1px solid var(--border-color); padding: 0.4rem; border-radius: 4px; font-family: inherit;">
                <option value="BTC-USD">BTC-USD</option>
                <option value="AAPL">AAPL</option>
            </select>
        </div>
    </header>

    <div class="dashboard-grid">
        
        <!-- Left Column: Order Entry & Agents -->
        <div class="panel" style="grid-column: 1; grid-row: 1 / span 2;">
            <div style="margin-bottom: 2rem;">
                <h2>Manual Order Entry</h2>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                        <button id="buy-btn" style="background: var(--buy-color); color: white; border: none; padding: 0.6rem; border-radius: 4px; font-weight: 700; cursor: pointer;">BUY</button>
                        <button id="sell-btn" style="background: var(--sell-color); color: white; border: none; padding: 0.6rem; border-radius: 4px; font-weight: 700; cursor: pointer;">SELL</button>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                        <label style="font-size: 0.75rem; color: var(--text-muted);">Price</label>
                        <input type="number" id="order-price" step="0.01" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; padding: 0.5rem; border-radius: 4px; font-family: 'Roboto Mono';">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                        <label style="font-size: 0.75rem; color: var(--text-muted);">Quantity</label>
                        <input type="number" id="order-qty" step="1" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; padding: 0.5rem; border-radius: 4px; font-family: 'Roboto Mono';">
                    </div>
                    <div id="order-status" style="font-size: 0.75rem; min-height: 1rem; transition: opacity 0.3s;"></div>
                </div>
            </div>

            <h2>Simulation Agents</h2>
            <div class="agents-list" id="agents-container">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Center Column -->
        <div class="center-col">
            <div class="panel">
                <h2>Execution Price Tracker</h2>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <h2>Aggregated Market Depth (Anonymized)</h2>
                <div class="orderbook-panel">
                    <!-- Bids -->
                    <div class="book-half">
                        <div class="book-header">
                            <span>Qty</span><span>Orders</span><span>Bid</span>
                        </div>
                        <div id="bids-body" style="flex:1; display:flex; flex-direction:column; overflow-y:auto; min-height: 0;"></div>
                    </div>
                    
                    <div style="display:flex; align-items:center; padding:0 1rem; color:var(--text-muted); font-weight:600;">|</div>

                    <!-- Asks -->
                    <div class="book-half">
                        <div class="book-header">
                            <span>Ask</span><span>Orders</span><span>Qty</span>
                        </div>
                        <div id="asks-body" style="flex:1; display:flex; flex-direction:column; overflow-y:auto; min-height: 0;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="right-col">
            <!-- Trade Feed Table -->
            <div class="panel">
                <h2>Structured Trade Feed</h2>
                <div style="flex: 1; overflow-y: auto; min-height: 0;">
                    <table class="feed-table">
                        <thead style="position: sticky; top: 0; background: var(--panel-bg); z-index: 10;">
                            <tr>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Buyer</th>
                                <th>Seller</th>
                            </tr>
                        </thead>
                        <tbody id="feed-body">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Activity Log -->
            <div class="panel">
                <h2>Causality Activity Stream</h2>
                <div class="log-stream" id="log-stream">
                   <!-- Injected via JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        const API = '/api';
        let currentSymbol = 'BTC-USD';
        
        document.getElementById('symbol-select').addEventListener('change', (e) => {
            currentSymbol = e.target.value;
            chartData.labels = [];
            chartData.datasets[0].data = [];
            document.getElementById('log-stream').innerHTML = ''; 
            document.getElementById('feed-body').innerHTML = ''; 
            displayedTradeIds.clear();
            updateChart();
        });

        document.getElementById('restart-btn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to restart the simulation? All data will be cleared.')) {
                try {
                    await fetch(`${API}/simulation/restart`, { method: 'POST' });
                    chartData.labels = [];
                    chartData.datasets[0].data = [];
                    document.getElementById('log-stream').innerHTML = '';
                    document.getElementById('feed-body').innerHTML = '';
                    displayedTradeIds.clear();
                    updateChart();
                } catch (err) {
                    console.error("Restart error: ", err);
                }
            }
        });

        const sendOrder = async (side) => {
            const price = parseFloat(document.getElementById('order-price').value);
            const quantity = parseInt(document.getElementById('order-qty').value);
            const statusEl = document.getElementById('order-status');

            if (!price || !quantity) {
                statusEl.innerText = "Error: Invalid Price or Qty";
                statusEl.style.color = "var(--sell-color)";
                return;
            }

            try {
                const res = await fetch(`${API}/v1/trading/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: currentSymbol,
                        side: side,
                        price: price,
                        quantity: quantity,
                        traderId: "Manual"
                    })
                });

                if (res.ok) {
                    statusEl.innerText = "Order placed successfully";
                    statusEl.style.color = "var(--buy-color)";
                    setTimeout(() => statusEl.innerText = "", 3000);
                } else {
                    statusEl.innerText = "Error: Server rejected order";
                    statusEl.style.color = "var(--sell-color)";
                }
            } catch (err) {
                statusEl.innerText = "Error: Network failure";
                statusEl.style.color = "var(--sell-color)";
            }
        };

        document.getElementById('buy-btn').addEventListener('click', () => sendOrder('BUY'));
        document.getElementById('sell-btn').addEventListener('click', () => sendOrder('SELL'));

        // Chart.js Setup
        const ctx = document.getElementById('priceChart').getContext('2d');
        let chartData = {
            labels: [],
            datasets: [{
                label: 'Match Price', borderColor: '#3b82f6', borderWidth: 2,
                backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.1, data: []
            }]
        };
        const executionChart = new Chart(ctx, {
            type: 'line', data: chartData,
            options: {
                responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                scales: {
                    x: { display: false },
                    y: { display: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
                },
                plugins: { legend: { display: false } },
                elements: { point:{ radius: 1 } }
            }
        });

        function updateChart() { executionChart.update(); }

        // Data Polling
        async function fetchSimulationData() {
            try {
                const agentRes = await fetch(`${API}/simulation/agents`);
                renderAgents(await agentRes.json());

                const bookRes = await fetch(`${API}/orderbook/${currentSymbol}`);
                renderOrderBook(await bookRes.json());

                const tradesRes = await fetch(`${API}/simulation/trades/${currentSymbol}`);
                processTrades(await tradesRes.json());
            } catch (err) {
                console.error("Data tracking error: ", err);
            }
        }

        // Format PnL 
        const formatMoney = (val) => {
            const classColor = val > 0 ? 'positive' : (val < 0 ? 'negative' : '');
            const sign = val > 0 ? '+' : '';
            return `<span class="val ${classColor}">${sign}$${Math.abs(val).toFixed(2)}</span>`;
        };

        const formatQty = (val) => {
            const classColor = val > 0 ? 'positive' : (val < 0 ? 'negative' : '');
            return `<span class="val ${classColor}">${val}</span>`;
        };

        function renderAgents(agents) {
            const container = document.getElementById('agents-container');
            container.innerHTML = '';
            
            // Only show agents trading the active symbol
            const filteredAgents = agents.filter(a => a.symbol === currentSymbol);
            
            filteredAgents.forEach(agent => {
                const div = document.createElement('div');
                div.className = 'agent-card';
                div.innerHTML = `
                    <div class="agent-header">
                        <div style="display:flex; align-items:center; gap:0.5rem">
                            <div class="pulse-dot"></div>
                            <span style="color:#e2e8f0;">[${agent.id}]</span>
                        </div>
                        <span style="color:var(--primary); font-size:0.8rem;">${agent.symbol}</span>
                    </div>
                    <div class="agent-metrics">
                        <div class="metric"><span>Trades:</span> <span class="val">${agent.tradeCount}</span></div>
                        <div class="metric"><span>Pos:</span> ${formatQty(agent.position)}</div>
                        <div class="metric" style="grid-column: span 2;"><span>PnL:</span> ${formatMoney(agent.pnl)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        let displayedTradeIds = new Set();
        
        function processTrades(trades) {
            const logStream = document.getElementById('log-stream');
            const feedBody = document.getElementById('feed-body');

            // Find missing causality.
            // If the buyer is manual, color it.
            const colorId = (id) => {
                if(id === "Manual") return `<span style="color:#a855f7">[${id}]</span>`;
                return `<span style="color:#e2e8f0; font-weight:600">[${id}]</span>`;
            };
            
            trades.forEach(trade => {
                const uniqueId = trade.buyOrderId + "-" + trade.sellOrderId + "-" + trade.timestamp;
                if(!displayedTradeIds.has(uniqueId)) {
                    displayedTradeIds.add(uniqueId);
                    
                    // Add Map data to Chart
                    chartData.labels.push(new Date(trade.timestamp).toLocaleTimeString());
                    chartData.datasets[0].data.push(trade.price);
                    
                    if(chartData.labels.length > 50) {
                        chartData.labels.shift();
                        chartData.datasets[0].data.shift();
                    }
                    
                    // 1. Add to Structured Feed Table
                    const feedTr = document.createElement('tr');
                    feedTr.innerHTML = `
                        <td style="color:white; font-weight:600;">${trade.price.toFixed(2)}</td>
                        <td>${trade.quantity}</td>
                        <td style="color:var(--buy-color)">${trade.buyerTraderId.substr(0,12)}</td>
                        <td style="color:var(--sell-color)">${trade.sellerTraderId.substr(0,12)}</td>
                    `;
                    feedBody.prepend(feedTr);
                    if (feedBody.children.length > 25) feedBody.removeChild(feedBody.lastChild);

                    // 2. Add to Causality Log Stream
                    // Example: Bob-Whale SELL 80 @ 102.71 -> matched with Alice-Retail BUY 34 @ 101.76
                    const logEl = document.createElement('div');
                    logEl.style.padding = '0.5rem 0';
                    logEl.style.borderBottom = '1px dashed rgba(255,255,255,0.05)';
                    logEl.innerHTML = `
                        <div>${colorId(trade.sellerTraderId)} <span style="color:var(--sell-color)">SELL</span> ${trade.quantity} @ ${trade.sellerOriginalPrice.toFixed(2)}</div>
                        <div>↳ matched with ${colorId(trade.buyerTraderId)} <span style="color:var(--buy-color)">BUY</span> @ ${trade.buyerOriginalPrice.toFixed(2)}</div>
                        <div style="color:var(--primary); margin-top:0.2rem">⇒ EXEC ${trade.quantity} @ <b>${trade.price.toFixed(2)}</b></div>
                    `;
                    logStream.prepend(logEl);
                    if (logStream.children.length > 30) logStream.removeChild(logStream.lastChild);
                }
            });
            updateChart();
        }

        function renderOrderBook(snapshot) {
            const bidsBody = document.getElementById('bids-body');
            const asksBody = document.getElementById('asks-body');
            bidsBody.innerHTML = '';
            asksBody.innerHTML = '';

            // Bids sorting (Highest to lowest)
            const sortedBids = snapshot.bids.sort((a,b) => b.price - a.price);
            sortedBids.slice(0, 20).forEach(level => {
                const row = document.createElement('div');
                row.className = 'book-row';
                row.innerHTML = `
                    <span style="font-weight:600">${level.totalQuantity}</span>
                    <span style="color:var(--text-muted)">${level.orderCount}</span>
                    <span class="price-buy">${level.price.toFixed(2)}</span>
                `;
                bidsBody.appendChild(row);
            });

            // Asks sorting (Lowest to highest)
            const sortedAsks = snapshot.asks.sort((a,b) => a.price - b.price);
            sortedAsks.slice(0, 20).forEach(level => {
                const row = document.createElement('div');
                row.className = 'book-row';
                row.innerHTML = `
                    <span class="price-sell">${level.price.toFixed(2)}</span>
                    <span style="color:var(--text-muted)">${level.orderCount}</span>
                    <span style="font-weight:600">${level.totalQuantity}</span>
                `;
                asksBody.appendChild(row);
            });
        }



        setInterval(fetchSimulationData, 1000);
        fetchSimulationData();
    </script>
</body>
</html>
